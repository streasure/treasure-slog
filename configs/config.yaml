# 日志配置
log:
  # 日志级别: debug, info, warn, error
  level: info
  # 日志格式: json, console
  format: json
  # 文件输出配置
  file:
    # 是否启用文件输出
    enabled: true
    # 日志文件路径
    path: ./logs/app.log
    # 轮转配置
    rotate:
      # 最大文件大小 (MB)
      max_size: 10
      # 最大保留文件数
      max_backups: 5
      # 最大保留时间 (天)
      max_age: 7
  # 堆栈追踪配置
  stacktrace:
    # 是否启用堆栈追踪
    enabled: true
    # 堆栈追踪级别: error, warn
    level: error
  # 日志采样配置
  sampling:
    # 是否启用采样
    enabled: true
    # 采样率
    initial: 100
    # 之后的采样率
    thereafter: 10
